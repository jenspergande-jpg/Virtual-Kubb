<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Kubb Virtual – Punkteberechnung</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1e3a1e; }
    .app { background: #1e3a1e; min-height: 100vh; font-family: 'Nunito', sans-serif; color: #f0d890; max-width: 430px; margin: 0 auto; padding-bottom: 24px; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px 8px; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-titles { display: flex; flex-direction: column; }
    .header-sub { font-size: 9px; color: #a8c090; letter-spacing: 2px; font-weight: 700; }
    .header-title { font-size: 22px; font-weight: 900; color: #f0d890; letter-spacing: 2px; line-height: 1.1; }
    .header-fields { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }
    .input-pill { background: rgba(0,0,0,0.25); border: 1.5px solid rgba(240,216,144,0.3); border-radius: 20px; padding: 5px 13px; font-size: 13px; font-weight: 700; color: #f0d890; outline: none; text-align: center; width: 110px; font-family: 'Nunito', sans-serif; transition: border-color 0.15s; }
    .input-pill::placeholder { color: rgba(240,216,144,0.35); }
    .input-pill:focus { border-color: rgba(240,216,144,0.6); }
    .lang-row { display: flex; gap: 5px; padding: 6px 14px 8px; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
    .lang-row::-webkit-scrollbar { display: none; }
    .lang-btn { padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(240,216,144,0.2); background: rgba(0,0,0,0.2); color: #a8c090; font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .lang-btn.active { background: #c8a020; border-color: #c8a020; color: #1e3a1e; }
    .main-card { margin: 0 10px; background: #2a4a2a; border-radius: 16px; overflow: hidden; padding: 6px 0; }
    .dist-row { display: flex; align-items: center; gap: 7px; padding: 6px 10px; }
    .dist-label { background: #8b5e3c; color: #f0d890; border-radius: 9px; padding: 5px 9px; font-size: 13px; font-weight: 800; min-width: 44px; text-align: center; }
    .dist-label.full { background: #c8a020; color: #1e3a1e; }
    .ctrl-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: #7a4e2a; color: #f0d890; font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.1s; font-family: 'Nunito', sans-serif; }
    .ctrl-btn:active { transform: scale(0.9); }
    .kubb-bar { flex: 1; display: flex; gap: 3px; align-items: center; justify-content: center; }
    .kubb-block { flex: 1; height: 26px; border-radius: 5px; background: rgba(255,255,255,0.1); transition: background 0.15s; }
    .kubb-block.hit { background: #d4a84b; }
    .kubb-block.hit-king { background: #f0d890; }
    .pts-box { background: rgba(0,0,0,0.25); border-radius: 9px; padding: 5px 8px; font-size: 13px; font-weight: 800; color: #f0d890; min-width: 58px; text-align: center; white-space: nowrap; }
    .pts-box.full { border: 1px solid #c8a020; }
    .sub-row { margin: 1px 10px 3px; border-radius: 8px; padding: 5px 10px; animation: fadeIn 0.3s ease; }
    .throw-question { background: rgba(200,160,32,0.1); border: 1px dashed #c8a020; display: flex; align-items: center; justify-content: space-between; }
    .throw-q-label { font-size: 10px; font-weight: 800; color: #c8a020; letter-spacing: 1px; }
    .throw-q-btns { display: flex; gap: 5px; }
    .throw-q-btn { padding: 3px 9px; border-radius: 7px; border: 1px solid rgba(200,160,32,0.4); background: rgba(0,0,0,0.2); color: #f0d890; font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
    .throw-q-btn:active { background: #c8a020; border-color: #c8a020; color: #1e3a1e; }
    .king-banner { background: rgba(200,160,32,0.15); border: 1px solid #c8a020; color: #c8a020; text-align: center; font-size: 10px; font-weight: 800; letter-spacing: 1.5px; }
    .king-result-row { margin: 1px 10px 3px; background: rgba(200,160,32,0.1); border: 1px solid #c8a020; border-radius: 8px; padding: 5px 10px; display: flex; align-items: center; justify-content: space-between; animation: fadeIn 0.3s ease; }
    .king-result-label { font-size: 10px; font-weight: 800; color: #c8a020; letter-spacing: 1px; }
    .king-result-btns { display: flex; gap: 5px; }
    .king-result-btn { padding: 3px 10px; border-radius: 7px; border: 1px solid rgba(200,160,32,0.4); background: rgba(0,0,0,0.2); color: #f0d890; font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
    .king-result-btn.active { background: #c8a020; border-color: #c8a020; color: #1e3a1e; }
    .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 3px 10px; }
    .summary-wrap { margin: 8px 10px 0; display: flex; flex-direction: column; gap: 7px; }
    .subtotal-row { background: #243c24; border-radius: 12px; padding: 9px 14px; display: flex; justify-content: space-between; align-items: center; }
    .subtotal-label { font-size: 10px; font-weight: 800; color: #a8c090; letter-spacing: 1.5px; }
    .subtotal-val { font-size: 20px; font-weight: 900; color: #f0d890; }
    .bonus-card { background: #243c24; border: 1px solid #c8a020; border-radius: 12px; padding: 9px 14px; }
    .bonus-title { font-size: 10px; font-weight: 800; color: #c8a020; letter-spacing: 1.5px; text-align: center; margin-bottom: 7px; }
    .bonus-controls { display: flex; align-items: center; gap: 9px; justify-content: center; }
    .bonus-num { font-size: 26px; font-weight: 900; color: #f0d890; min-width: 28px; text-align: center; }
    .bonus-formula { font-size: 13px; font-weight: 700; color: #a8c090; }
    .bonus-formula span { color: #f0d890; font-weight: 900; }
    .ok-btn { padding: 5px 14px; border-radius: 20px; border: none; background: #c8a020; color: #1e3a1e; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; cursor: pointer; }
    .final-card { background: #8b5e3c; border-radius: 12px; padding: 11px 14px; display: flex; justify-content: space-between; align-items: center; }
    .final-label { font-size: 10px; font-weight: 800; color: rgba(240,216,144,0.7); letter-spacing: 1.5px; }
    .final-val { font-size: 34px; font-weight: 900; color: #f0d890; line-height: 1; }
    .final-val span { font-size: 14px; font-weight: 700; color: rgba(240,216,144,0.7); margin-left: 3px; }
    .new-round-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; background: rgba(255,255,255,0.07); color: #a8c090; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; }
    .new-round-btn:hover { background: rgba(255,255,255,0.12); color: #f0d890; }
    .copyright { text-align: center; font-size: 10px; color: rgba(168,192,144,0.4); margin-top: 4px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const MULTIPLIERS = [4, 5, 6, 7, 8];
    const DISTANCES = ["4 m", "5 m", "6 m", "7 m", "8 m"];

    const TRANSLATIONS = {
      DE: { title: "KUBB", sub: "INTERNATIONAL · VIRTUAL", name: "Name", round: "Runde", king: "KÖNIG FREIGESCHALTET", kingBonus: "KÖNIG-BONUS · 8 M", intermediate: "ZWISCHENSUMME", final: "ENDSTAND", newRound: "NEUE RUNDE", pts: "Pkt", apply: "OK", throws5: "5 Würfe", throws6: "6 Würfe", kingHit: "TREFFER", kingMiss: "VERFEHLT", possible: "MÖGLICH" },
      EN: { title: "KUBB", sub: "INTERNATIONAL · VIRTUAL", name: "Name", round: "Round", king: "KING UNLOCKED", kingBonus: "KING BONUS · 8 M", intermediate: "SUBTOTAL", final: "FINAL SCORE", newRound: "NEW ROUND", pts: "Pts", apply: "OK", throws5: "5 throws", throws6: "6 throws", kingHit: "HIT", kingMiss: "MISSED", possible: "POSSIBLE" },
      FR: { title: "KUBB", sub: "INTERNATIONAL · VIRTUAL", name: "Nom", round: "Manche", king: "ROI DÉBLOQUÉ", kingBonus: "BONUS ROI · 8 M", intermediate: "SOUS-TOTAL", final: "SCORE FINAL", newRound: "NOUVEAU TOUR", pts: "Pts", apply: "OK", throws5: "5 lancers", throws6: "6 lancers", kingHit: "TOUCHÉ", kingMiss: "RATÉ", possible: "POSSIBLE" },
      ES: { title: "KUBB", sub: "INTERNACIONAL · VIRTUAL", name: "Nombre", round: "Ronda", king: "REY DESBLOQUEADO", kingBonus: "BONO REY · 8 M", intermediate: "SUBTOTAL", final: "PUNTUACIÓN FINAL", newRound: "NUEVA RONDA", pts: "Pts", apply: "OK", throws5: "5 lanzam.", throws6: "6 lanzam.", kingHit: "TOCADO", kingMiss: "FALLADO", possible: "POSIBLE" },
      IT: { title: "KUBB", sub: "INTERNAZIONALE · VIRTUALE", name: "Nome", round: "Round", king: "RE SBLOCCATO", kingBonus: "BONUS RE · 8 M", intermediate: "SUBTOTALE", final: "PUNTEGGIO FINALE", newRound: "NUOVO ROUND", pts: "Pti", apply: "OK", throws5: "5 lanci", throws6: "6 lanci", kingHit: "COLPITO", kingMiss: "MANCATO", possible: "POSSIBILE" },
      CS: { title: "KUBB", sub: "MEZINÁRODNÍ · VIRTUÁLNÍ", name: "Jméno", round: "Kolo", king: "KRÁL ODEMČEN", kingBonus: "BONUS KRÁLE · 8 M", intermediate: "MEZISOUČET", final: "KONEČNÉ SKÓRE", newRound: "NOVÉ KOLO", pts: "b.", apply: "OK", throws5: "5 hodů", throws6: "6 hodů", kingHit: "ZÁSAH", kingMiss: "MINUTÍ", possible: "MOŽNÉ" },
      SL: { title: "KUBB", sub: "MEDNARODNI · VIRTUALNI", name: "Ime", round: "Runda", king: "KRALJ ODKLENJEN", kingBonus: "BONUS KRALJA · 8 M", intermediate: "VMESNI SEŠTEVEK", final: "KONČNI REZULTAT", newRound: "NOVA RUNDA", pts: "Pkt", apply: "OK", throws5: "5 metov", throws6: "6 metov", kingHit: "ZADETEK", kingMiss: "ZGREŠEN", possible: "MOŽNO" },
      PL: { title: "KUBB", sub: "MIĘDZYNARODOWY · WIRTUALNY", name: "Imię", round: "Runda", king: "KRÓL ODBLOKOWANY", kingBonus: "BONUS KRÓLA · 8 M", intermediate: "SUMA CZĘŚCIOWA", final: "WYNIK KOŃCOWY", newRound: "NOWA RUNDA", pts: "Pkt", apply: "OK", throws5: "5 rzutów", throws6: "6 rzutów", kingHit: "TRAFIONY", kingMiss: "PUDŁO", possible: "MOŻLIWE" },
    };

    const LANGS = ["DE","EN","FR","ES","IT","CS","SL","PL"];

    const KubbTowerIcon = () => (
      <svg width="38" height="44" viewBox="0 0 38 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="36" width="32" height="7" rx="2" fill="#8b5e3c"/>
        <rect x="3" y="36" width="32" height="3" rx="2" fill="#a06a42"/>
        <rect x="10" y="14" width="18" height="24" rx="2" fill="#8b5e3c"/>
        <rect x="10" y="14" width="18" height="5" rx="2" fill="#a06a42"/>
        <rect x="8" y="8" width="5" height="10" rx="1.5" fill="#c8a020"/>
        <rect x="16.5" y="6" width="5" height="12" rx="1.5" fill="#c8a020"/>
        <rect x="25" y="8" width="5" height="10" rx="1.5" fill="#c8a020"/>
        <rect x="12" y="16" width="3" height="18" rx="1.5" fill="rgba(255,255,255,0.1)"/>
      </svg>
    );

    function KubbScorer() {
      const [lang, setLang] = useState("DE");
      const [name, setName] = useState("");
      const [round, setRound] = useState("");
      const [hits, setHits] = useState([0, 0, 0, 0, 0]);
      const [throwCount, setThrowCount] = useState([null, null, null, null, null]);
      const [kingResult, setKingResult] = useState([null, null, null, null, null]);
      const [bonusCount, setBonusCount] = useState(0);
      const [bonusApplied, setBonusApplied] = useState(false);

      const t = TRANSLATIONS[lang];

      const changeHit = (i, delta) => {
        const newHits = [...hits];
        const newVal = Math.max(0, Math.min(5, newHits[i] + delta));
        newHits[i] = newVal;
        setHits(newHits);
        if (newVal !== 5) {
          const nt = [...throwCount]; nt[i] = null; setThrowCount(nt);
          const nk = [...kingResult]; nk[i] = null; setKingResult(nk);
        }
      };

      const setThrows = (i, count) => {
        const nt = [...throwCount]; nt[i] = count; setThrowCount(nt);
        if (count === 6) { const nk = [...kingResult]; nk[i] = null; setKingResult(nk); }
      };

      const setKing = (i, val) => {
        const nk = [...kingResult]; nk[i] = nk[i] === val ? null : val; setKingResult(nk);
      };

      const calcRow = (i) => {
        const h = hits[i], m = MULTIPLIERS[i];
        if (h === 5 && throwCount[i] === 5) return 5 * m + (kingResult[i] === true ? 2 * m : 0);
        return h * m;
      };

      const bonusEligible = hits.filter((h, i) => h === 5 && throwCount[i] === 5 && kingResult[i] !== null).length;
      const basePoints = hits.reduce((s, _, i) => s + calcRow(i), 0);
      const bonusPoints = bonusApplied ? bonusCount * 8 : 0;
      const total = basePoints + bonusPoints;

      const reset = () => {
        setHits([0,0,0,0,0]);
        setThrowCount([null,null,null,null,null]);
        setKingResult([null,null,null,null,null]);
        setBonusCount(0); setBonusApplied(false);
      };

      return (
        <div className="app">
          <div className="header">
            <div className="header-left">
              <KubbTowerIcon />
              <div className="header-titles">
                <div className="header-sub">{t.sub}</div>
                <div className="header-title">{t.title}</div>
              </div>
            </div>
            <div className="header-fields">
              <input className="input-pill" placeholder={t.name} value={name} onChange={e => setName(e.target.value)} />
              <input className="input-pill" placeholder={t.round} value={round} onChange={e => setRound(e.target.value)} />
            </div>
          </div>

          <div className="lang-row">
            {LANGS.map(l => (
              <button key={l} className={"lang-btn" + (lang === l ? " active" : "")} onClick={() => setLang(l)}>{l}</button>
            ))}
          </div>

          <div className="main-card">
            {DISTANCES.map((dist, i) => {
              const h = hits[i], m = MULTIPLIERS[i];
              const full = h === 5 && throwCount[i] !== null;
              const kingUnlocked = h === 5 && throwCount[i] === 5;
              const pts = calcRow(i);
              return (
                <div key={i}>
                  <div className="dist-row">
                    <div className={"dist-label" + (full ? " full" : "")}>{dist}</div>
                    <button className="ctrl-btn" onClick={() => changeHit(i, -1)}>−</button>
                    <div className="kubb-bar">
                      {[0,1,2,3,4].map(k => (
                        <div key={k} className={"kubb-block" + (k < h ? (kingUnlocked && k === 4 ? " hit-king" : " hit") : "")} />
                      ))}
                    </div>
                    <button className="ctrl-btn" onClick={() => changeHit(i, 1)}>+</button>
                    <div className={"pts-box" + (full ? " full" : "")}>{pts} {t.pts}</div>
                  </div>

                  {h === 5 && throwCount[i] === null && (
                    <div className="sub-row throw-question">
                      <span className="throw-q-label">5 oder 6 Würfe?</span>
                      <div className="throw-q-btns">
                        <button className="throw-q-btn" onClick={() => setThrows(i, 5)}>👑 {t.throws5}</button>
                        <button className="throw-q-btn" onClick={() => setThrows(i, 6)}>{t.throws6}</button>
                      </div>
                    </div>
                  )}

                  {kingUnlocked && (
                    <div className="sub-row king-banner">👑 {t.king}</div>
                  )}

                  {kingUnlocked && (
                    <div className="king-result-row">
                      <span className="king-result-label">KÖNIGSWURF</span>
                      <div className="king-result-btns">
                        <button className={"king-result-btn" + (kingResult[i] === true ? " active" : "")} onClick={() => setKing(i, true)}>{t.kingHit}</button>
                        <button className={"king-result-btn" + (kingResult[i] === false ? " active" : "")} onClick={() => setKing(i, false)}>{t.kingMiss}</button>
                      </div>
                    </div>
                  )}

                  {i < 4 && <div className="divider" />}
                </div>
              );
            })}
          </div>

          <div className="summary-wrap">
            <div className="subtotal-row">
              <span className="subtotal-label">{t.intermediate}</span>
              <span className="subtotal-val">{basePoints} {t.pts}</span>
            </div>

            {bonusEligible > 0 && (
              <div className="bonus-card">
                <div className="bonus-title">{t.kingBonus} · {bonusEligible} {t.possible}</div>
                <div className="bonus-controls">
                  <button className="ctrl-btn" onClick={() => { setBonusCount(Math.max(0, bonusCount-1)); setBonusApplied(false); }}>−</button>
                  <span className="bonus-num">{bonusCount}</span>
                  <button className="ctrl-btn" onClick={() => { setBonusCount(Math.min(bonusEligible, bonusCount+1)); setBonusApplied(false); }}>+</button>
                  <span className="bonus-formula">× 8 = <span>{bonusCount * 8}</span></span>
                  <button className="ok-btn" onClick={() => setBonusApplied(true)}>{t.apply}</button>
                </div>
              </div>
            )}

            <div className="final-card">
              <span className="final-label">{name ? (name + (round ? ' · ' + round : '')) : t.final}</span>
              <div className="final-val">{total}<span>{t.pts}</span></div>
            </div>

            <button className="new-round-btn" onClick={reset}>{t.newRound}</button>
            <div className="copyright">© Jens Pergande 2026</div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<KubbScorer />, document.getElementById('root'));
  </script>
</body>
</html>
