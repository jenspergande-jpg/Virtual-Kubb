      SR: { title: "KUBB", sub: "МЕЂУНАРОДНИ · ВИРТУЕЛНИ", name: "Име", club: "Клуб", round: "Рунда", king: "КРАЉ ОТКЉУЧАН", kingBonus: "БОНУС КРАЉА · 8 М", intermediate: "МЕЂУЗБИР", final: "КОНАЧНИ РЕЗУЛТАТ", newRound: "НОВА РУНДА", pts: "Бод", apply: "ОК", throws5: "5 бацања", throws6: "6 бацања", kingHit: "ПОГОДАК", kingMiss: "ПРОМАШАЈ", possible: "МОГУЋЕ", challengeOff: "CHALLENGE РЕЖим", challengeOn: "🏆 CHALLENGE АКТИВАН", submit: "🏆 ПОШАЉИ РЕЗУЛТАТ", locked: "УНОС ЗАКЉУЧАН" },
      UK: { title: "KUBB", sub: "МІЖНАРОДНИЙ · ВІРТУАЛЬНИЙ", name: "Ім'я", club: "Клуб", round: "Раунд", king: "КОРОЛЬ РОЗБЛОКОВАНО", kingBonus: "БОНУС КОРОЛЯ · 8 М", intermediate: "ПРОМІЖНИЙ ПІДСУМОК", final: "КІНЦЕВИЙ РЕЗУЛЬТАТ", newRound: "НОВИЙ РАУНД", pts: "Очки", apply: "ОК", throws5: "5 кидків", throws6: "6 кидків", kingHit: "ВЛУЧАННЯ", kingMiss: "ПРОМАХ", possible: "МОЖЛИВО", challengeOff: "РЕЖИМ CHALLENGE", challengeOn: "🏆 CHALLENGE АКТИВНИЙ", submit: "🏆 НАДІСЛАТИ РЕЗУЛЬТАТ", locked: "ВВЕДЕННЯ ЗАБЛОКОВАНО" },
      TR: { title: "KUBB", sub: "ULUSLARARASI · SANAL", name: "İsim", club: "Kulüp", round: "Tur", king: "KRAL KİLİDİ AÇILDI", kingBonus: "KRAL BONUSU · 8 M", intermediate: "ARA TOPLAM", final: "FINAL SKORU", newRound: "YENİ TUR", pts: "Puan", apply: "OK", throws5: "5 atış", throws6: "6 atış", kingHit: "İSABET", kingMiss: "KAÇIRDI", possible: "MÜMKÜN", challengeOff: "CHALLENGE MODU", challengeOn: "🏆 CHALLENGE AKTİF", submit: "🏆 SONUCU GÖNDER", locked: "GİRİŞ KİLİTLENDİ" },
    };

    const LANGS = ["DE","EN","FR","ES","IT","NL","PT","CS","SK","PL","HU","RO","HR","SL","SV","DA","NO","FI","EL","BG","SR","UK","TR"];

    const KubbTowerIcon = () => (
      <svg width="38" height="44" viewBox="0 0 38 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="36" width="32" height="7" rx="2" fill="#8b5e3c"/>
        <rect x="3" y="36" width="32" height="3" rx="2" fill="#a06a42"/>
        <rect x="10" y="14" width="18" height="24" rx="2" fill="#8b5e3c"/>
        <rect x="10" y="14" width="18" height="5" rx="2" fill="#a06a42"/>
        <rect x="8" y="8" width="5" height="10" rx="1.5" fill="#c8a020"/>
        <rect x="16.5" y="6" width="5" height="12" rx="1.5" fill="#c8a020"/>
        <rect x="25" y="8" width="5" height="10" rx="1.5" fill="#c8a020"/>
        <rect x="12" y="16" width="3" height="18" rx="1.5" fill="rgba(255,255,255,0.1)"/>
      </svg>
    );

    const CHALLENGE_EMAIL = "sundkoeppe@gmx.de";

    function KubbScorer() {
      const [lang, setLang] = useState("DE");
      const [name, setName] = useState("");
      const [club, setClub] = useState("");
      const [round, setRound] = useState("");
      const [hits, setHits] = useState([0, 0, 0, 0, 0]);
      const [throwCount, setThrowCount] = useState([null, null, null, null, null]);
      const [kingResult, setKingResult] = useState([null, null, null, null, null]);
      const [bonusCount, setBonusCount] = useState(0);
      const [bonusApplied, setBonusApplied] = useState(false);
      const [challengeMode, setChallengeMode] = useState(false);
      const [locked, setLocked] = useState(false);
      const [startTime, setStartTime] = useState(null);
      const [clock, setClock] = useState("");

      useEffect(() => {
        const timer = setInterval(() => {
          const now = new Date();
          setClock(now.toLocaleTimeString('de-DE'));
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      const toggleChallenge = () => {
        if (!challengeMode) setStartTime(new Date());
        else setStartTime(null);
        setChallengeMode(!challengeMode);
        setLocked(false);
      };

      const t = TRANSLATIONS[lang];

      const changeHit = (i, delta) => {
        const newHits = [...hits];
        const newVal = Math.max(0, Math.min(5, newHits[i] + delta));
        newHits[i] = newVal;
        setHits(newHits);
        if (newVal !== 5) {
          const nt = [...throwCount]; nt[i] = null; setThrowCount(nt);
          const nk = [...kingResult]; nk[i] = null; setKingResult(nk);
        }
      };

      const setThrows = (i, count) => {
        const nt = [...throwCount]; nt[i] = count; setThrowCount(nt);
        if (count === 6) { const nk = [...kingResult]; nk[i] = null; setKingResult(nk); }
      };

      const setKing = (i, val) => {
        const nk = [...kingResult]; nk[i] = nk[i] === val ? null : val; setKingResult(nk);
      };

      const calcRow = (i) => {
        const h = hits[i], m = MULTIPLIERS[i];
        if (h === 5 && throwCount[i] === 5) return 5 * m + (kingResult[i] === true ? 2 * m : 0);
        return h * m;
      };

      const bonusEligible = hits.filter((h, i) => h === 5 && throwCount[i] === 5 && kingResult[i] !== null).length;
      const basePoints = hits.reduce((s, _, i) => s + calcRow(i), 0);
      const bonusPoints = bonusApplied ? bonusCount * 8 : 0;
      const total = basePoints + bonusPoints;

      const reset = () => {
        setHits([0,0,0,0,0]);
        setThrowCount([null,null,null,null,null]);
        setKingResult([null,null,null,null,null]);
        setBonusCount(0); setBonusApplied(false);
      };

      const sendChallenge = () => {
        const now = new Date();
        const dateStr = now.toLocaleDateString('de-DE');
        const endTime = now.toLocaleTimeString('de-DE');
        const startTimeStr = startTime ? startTime.toLocaleTimeString('de-DE') : '–';
        const distNames = ["4m","5m","6m","7m","8m"];
        const rowDetails = hits.map((h, i) => {
          const pts = calcRow(i);
          const king = throwCount[i] === 5 ? (kingResult[i] === true ? " 👑 Treffer" : " 👑 Verfehlt") : "";
          return `  ${distNames[i]}: ${h} Treffer = ${pts} Pkt${king}`;
        }).join("\n");
        const subject = `Kubb Challenge – ${name} – ${dateStr} ${endTime}`;
        const body = `KUBB VIRTUAL CHALLENGE\n\nName: ${name}\nVerein: ${club}\nRunde: ${round}\nDatum: ${dateStr}\nStart: ${startTimeStr}\nEnde: ${endTime}\n\nEinzelergebnisse:\n${rowDetails}\n\nZwischensumme: ${basePoints} Pkt\nBonus (${bonusCount} × 8): ${bonusPoints} Pkt\n\nENDSTAND: ${total} Pkt`;
        setLocked(true);
        window.location.href = `mailto:${CHALLENGE_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      };

      return (
        <div className="app">
          <div className="header">
            <div className="header-left">
              <KubbTowerIcon />
              <div className="header-titles">
                <div className="header-sub">{t.sub}</div>
                <div className="header-title">{t.title}</div>
              </div>
            </div>
            <div className="header-fields">
              <input className="input-pill" placeholder={t.name} value={name} onChange={e => setName(e.target.value)} />
              {challengeMode && <input className="input-pill" placeholder="Verein" value={club} onChange={e => setClub(e.target.value)} />}
              <input className="input-pill" placeholder={t.round} value={round} onChange={e => setRound(e.target.value)} />
            </div>
          </div>

          <div className="lang-row">
            {LANGS.map(l => (
              <button key={l} className={"lang-btn" + (lang === l ? " active" : "")} onClick={() => setLang(l)}>{l}</button>
            ))}
          </div>

          <div className="challenge-bar">
            <div>
              <span className={"challenge-label" + (challengeMode ? " active" : "")}>
                {challengeMode ? t.challengeOn : t.challengeOff}
              </span>
              {challengeMode && <div style={{fontSize:'18px', fontWeight:'900', color:'#f0d890', letterSpacing:'2px', marginTop:'2px'}}>{clock}</div>}
            </div>
            <button className={"toggle" + (challengeMode ? " on" : "")} onClick={toggleChallenge} disabled={locked}>
              <div className="toggle-knob"></div>
            </button>
          </div>

          <div className="main-card" style={{opacity: locked ? 0.6 : 1, pointerEvents: locked ? 'none' : 'auto'}}>
            {DISTANCES.map((dist, i) => {
              const h = hits[i], m = MULTIPLIERS[i];
              const full = h === 5 && throwCount[i] !== null;
              const kingUnlocked = h === 5 && throwCount[i] === 5;
              const pts = calcRow(i);
              return (
                <div key={i}>
                  <div className="dist-row">
                    <div className={"dist-label" + (full ? " full" : "")}>{dist}</div>
                    <button className="ctrl-btn" onClick={() => changeHit(i, -1)}>−</button>
                    <div className="kubb-bar">
                      {[0,1,2,3,4].map(k => (
                        <div key={k} className={"kubb-block" + (k < h ? (kingUnlocked && k === 4 ? " hit-king" : " hit") : "")} />
                      ))}
                    </div>
                    <button className="ctrl-btn" onClick={() => changeHit(i, 1)}>+</button>
                    <div className={"pts-box" + (full ? " full" : "")}>{pts} {t.pts}</div>
                  </div>

                  {h === 5 && throwCount[i] === null && (
                    <div className="sub-row throw-question">
                      <span className="throw-q-label">5 oder 6 Würfe?</span>
                      <div className="throw-q-btns">
                        <button className="throw-q-btn" onClick={() => setThrows(i, 5)}>👑 {t.throws5}</button>
                        <button className="throw-q-btn" onClick={() => setThrows(i, 6)}>{t.throws6}</button>
                      </div>
                    </div>
                  )}

                  {kingUnlocked && (
                    <div className="sub-row king-banner">👑 {t.king}</div>
                  )}

                  {kingUnlocked && (
                    <div className="king-result-row">
                      <span className="king-result-label">KÖNIGSWURF</span>
                      <div className="king-result-btns">
                        <button className={"king-result-btn" + (kingResult[i] === true ? " active" : "")} onClick={() => setKing(i, true)}>{t.kingHit}</button>
                        <button className={"king-result-btn" + (kingResult[i] === false ? " active" : "")} onClick={() => setKing(i, false)}>{t.kingMiss}</button>
                      </div>
                    </div>
                  )}

                  {i < 4 && <div className="divider" />}
                </div>
              );
            })}
          </div>

          <div className="summary-wrap">
            <div className="subtotal-row">
              <span className="subtotal-label">{t.intermediate}</span>
              <span className="subtotal-val">{basePoints} {t.pts}</span>
            </div>

            {bonusEligible > 0 && (
              <div className="bonus-card">
                <div className="bonus-title">{t.kingBonus} · {bonusEligible} {t.possible}</div>
                <div className="bonus-controls">
                  <button className="ctrl-btn" onClick={() => { setBonusCount(Math.max(0, bonusCount-1)); setBonusApplied(false); }}>−</button>
                  <span className="bonus-num">{bonusCount}</span>
                  <button className="ctrl-btn" onClick={() => { setBonusCount(Math.min(bonusEligible, bonusCount+1)); setBonusApplied(false); }}>+</button>
                  <span className="bonus-formula">× 8 = <span>{bonusCount * 8}</span></span>
                  <button className="ok-btn" onClick={() => setBonusApplied(true)}>{t.apply}</button>
                </div>
              </div>
            )}

            <div className="final-card">
              <span className="final-label">{name ? (name + (round ? ' · ' + round : '')) : t.final}</span>
              <div className="final-val">{total}<span>{t.pts}</span></div>
            </div>

            <button className="new-round-btn" onClick={reset}>{t.newRound}</button>
            {challengeMode && !locked && (
              <button className="submit-btn" onClick={sendChallenge}>{t.submit}</button>
            )}
            {locked && (
              <div className="submit-btn" style={{background:'#5a3e10', color:'rgba(240,216,144,0.5)', cursor:'not-allowed', textAlign:'center'}}>🔒 {t.locked}</div>
            )}
            <div className="copyright">© Jens Pergande 2026</div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<KubbScorer />, document.getElementById('root'));
  </script>
</body>
</html>
